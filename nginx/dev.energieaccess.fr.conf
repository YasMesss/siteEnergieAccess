# /etc/nginx/sites-available/dev.energieaccess.fr
# Next.js via PM2 (ex. port 3001) — ajuster proxy_pass selon votre port d'écoute.
# SSL : sudo certbot --nginx -d dev.energieaccess.fr

server {
    listen 80;
    listen [::]:80;
    server_name dev.energieaccess.fr;

    access_log /var/log/nginx/dev.energieaccess.fr.access.log;
    error_log  /var/log/nginx/dev.energieaccess.fr.error.log;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Upload factures (devis) jusqu'à 10 Mo
    client_max_body_size 12M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
